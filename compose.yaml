# ----------------------------------------------------------------------------------------------------------------------
#                                                 Docker Compose
# ----------------------------------------------------------------------------------------------------------------------
# Using Docker Compose, we can create a containerized environment that allows us to run the app locally.
# We use the following services:
# - app: The main app for the TruNorth Timesheet datatables ingest and dashboard.
# - db:  The sqlite database for the TruNorth Timesheet datatables.
#
# (this is a bit overkill for a simple app, but it allows us to deploy a database without having to install it locally)
# NOTE: V1 scaffold only. No database or backend logic implemented yet.
# ----------------------------------------------------------------------------------------------------------------------

services:
  app:
    build: .
    ports:
      - "8050:8050"
    environment:
      - DASH_HOST=0.0.0.0
      - DASH_PORT=8050
      - REACT_VERSION=18.2.0
    depends_on:
      - db

  db:
    image: keinos/sqlite3:latest
    command: tail -f /dev/null
    volumes:
      - db-data:/data

volumes:
  db-data:
